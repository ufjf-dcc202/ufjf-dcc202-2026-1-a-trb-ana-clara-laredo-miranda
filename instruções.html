    <div class="instrucoes">
        <h1>Instruções do Jogo</h1>
        <p>O objetivo do jogo é mover todos os discos da torre inicial para a torre final, seguindo estas regras:</p>
        <ul>
            <li>Você só pode mover um disco por vez.</li>
            <li>Um disco maior não pode ser colocado sobre um disco menor.</li>
            <li>Você pode usar a torre intermediária como apoio.</li>
        </ul>
    </div>
</body>
